interface:
  display_name: "Delegated Session Orchestrator"
  short_description: "Coordinate multi-session build loops"
  default_prompt: "Use $delegated-session-orchestrator to read the current repo docs, identify the next coherent feature package, split it into bounded isolated worktree/session tasks, require self-review and honest evidence labels, notify me in my preferred language for human actions, review/merge clean branches according to project policy, and dispatch the next batch only when it reduces merge risk."
